<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Nossa Dupla</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <header class="page-header">
    <p class="eyebrow">conheça a dupla</p>
    <h1>Somos <span class="grad">nós dois 🤝</span></h1>
  </header>

  <section class="cards-grid">

    <!-- ── CARD: VOCÊ ── -->
    <article class="card member-a">

      <div class="card-blob">
        <span></span><span></span><span></span>
      </div>

      <div class="avatar-wrap">
        <div class="avatar-ring">
          <div class="avatar-inner">🧑‍💻</div>
        </div>
      </div>

      <div class="card-body">
        <h2
          class="card-name"
          contenteditable="true"
          data-placeholder="Seu nome"
        ></h2>

        <p
          class="card-role"
          contenteditable="true"
          data-placeholder="Sua função"
        ></p>

        <p
          class="card-bio"
          contenteditable="true"
          data-placeholder="Escreva uma bio curta sobre você..."
        ></p>

        <div class="tags">
          <span class="tag">HTML</span>
          <span class="tag">CSS</span>
          <span class="tag">JavaScript</span>
        </div>
      </div>

      <footer class="card-footer">
        <a href="#" class="social-link" title="GitHub">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61
                     c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77
                     A5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48
                     a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1
                     A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78
                     c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/>
          </svg>
        </a>
        <a href="#" class="social-link" title="LinkedIn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round">
            <path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2
                     2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"/>
            <rect x="2" y="9" width="4" height="12"/>
            <circle cx="4" cy="4" r="2"/>
          </svg>
        </a>
        <a href="#" class="social-link" title="Instagram">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
            <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/>
            <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/>
          </svg>
        </a>
      </footer>
    </article>

    <!-- ── CARD: AMIGO ── -->
    <article class="card member-b">

      <div class="card-blob">
        <span></span><span></span><span></span>
      </div>

      <div class="avatar-wrap">
        <div class="avatar-ring">
          <div class="avatar-inner">🎨</div>
        </div>
      </div>

      <div class="card-body">
        <h2
          class="card-name"
          contenteditable="true"
          data-placeholder="Nome do amigo"
        ></h2>

        <p
          class="card-role"
          contenteditable="true"
          data-placeholder="Função do amigo"
        ></p>

        <p
          class="card-bio"
          contenteditable="true"
          data-placeholder="Escreva uma bio curta sobre seu amigo..."
        ></p>

        <div class="tags">
          <span class="tag">Design</span>
          <span class="tag">Figma</span>
          <span class="tag">Criatividade</span>
        </div>
      </div>

      <footer class="card-footer">
        <a href="#" class="social-link" title="GitHub">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61
                     c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77
                     A5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48
                     a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1
                     A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78
                     c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/>
          </svg>
        </a>
        <a href="#" class="social-link" title="LinkedIn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round">
            <path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2
                     2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"/>
            <rect x="2" y="9" width="4" height="12"/>
            <circle cx="4" cy="4" r="2"/>
          </svg>
        </a>
        <a href="#" class="social-link" title="Instagram">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
            <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/>
            <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/>
          </svg>
        </a>
      </footer>
    </article>

  </section>

  <p class="edit-hint">Clique nos campos para editar nome, função e bio</p>

</body>
</html>
